name: DevOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Build Docker
      run: docker build -t flask-app .

    - name: Run Compose Test
      run: docker-compose up -d

    - name: Verify
      run: curl http://localhost:5000/health
